<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Green Drive - Never Ending Car Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a2c 50%, #0e3a1e 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Greenery Background Elements */
        .grass {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            background: repeating-linear-gradient(45deg, #2d6a2d, #2d6a2d 30px, #3a7a3a 30px, #3a7a3a 60px);
            z-index: 0;
        }

        .tree {
            position: fixed;
            bottom: 80px;
            width: 80px;
            height: 120px;
            background: #2e7d32;
            border-radius: 50% 50% 30% 30%;
            z-index: 0;
        }

        .tree::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 30px;
            width: 20px;
            height: 40px;
            background: #8B4513;
            border-radius: 5px;
        }

        .tree:nth-child(1) { left: 30px; height: 150px; width: 100px; }
        .tree:nth-child(2) { right: 30px; height: 130px; width: 90px; background: #1b5e20; }
        .tree:nth-child(3) { left: 200px; height: 110px; width: 85px; background: #388e3c; }
        .tree:nth-child(4) { right: 200px; height: 140px; width: 95px; }
        .tree:nth-child(5) { left: 400px; height: 100px; width: 80px; background: #4caf50; }
        .tree:nth-child(6) { right: 400px; height: 120px; width: 88px; background: #2e7d32; }

        .flower {
            position: fixed;
            bottom: 70px;
            width: 20px;
            height: 20px;
            background: #ff69b4;
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 10px rgba(255,105,180,0.5);
        }

        .flower::before {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 8px;
            width: 4px;
            height: 20px;
            background: #228b22;
        }

        /* Registration Panel */
        .registration-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.5s ease;
        }

        .reg-container {
            background: linear-gradient(135deg, #1e3c1e, #0a2a0a);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(76, 175, 80, 0.3);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .reg-container h1 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .reg-container .subtitle {
            color: #a5d6a7;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #c8e6c9;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.9);
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
            background: white;
        }

        .car-select {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
        }

        .car-option {
            cursor: pointer;
            padding: 10px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .car-option.selected {
            border-color: #ffd700;
            background: rgba(255,215,0,0.2);
            transform: scale(1.05);
        }

        .car-option:hover {
            transform: scale(1.05);
        }

        .car-preview {
            width: 60px;
            height: 40px;
            border-radius: 8px;
        }

        .car-red { background: #e53935; }
        .car-blue { background: #1e88e5; }
        .car-green { background: #43a047; }
        .car-yellow { background: #fdd835; }

        .reg-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a472a;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            width: 100%;
        }

        .reg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Game Container */
        .game-wrapper {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: #2c2c2c;
            cursor: none;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50px;
            backdrop-filter: blur(5px);
            color: white;
            font-weight: bold;
        }

        .driver-info {
            background: rgba(255,215,0,0.2);
            padding: 8px 15px;
            border-radius: 25px;
        }

        .score-box {
            font-size: 24px;
        }

        .score-box span {
            color: #ffd700;
            font-size: 32px;
            margin-left: 10px;
        }

        .controls {
            display: flex;
            gap: 20px;
            font-size: 12px;
        }

        .controls kbd {
            background: #333;
            padding: 4px 10px;
            border-radius: 8px;
            color: #ffd700;
            font-weight: bold;
        }

        /* Score Page (After Crash) */
        .score-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .score-card {
            background: linear-gradient(135deg, #1e3c1e, #0a2a0a);
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #ffd700;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .score-card h1 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 20px;
        }

        .crash-icon {
            font-size: 80px;
            margin: 20px 0;
        }

        .final-score {
            font-size: 36px;
            color: white;
            margin: 20px 0;
        }

        .final-score span {
            color: #ffd700;
            font-size: 52px;
            font-weight: bold;
        }

        .driver-stats {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .driver-stats p {
            color: #a5d6a7;
            margin: 10px 0;
            font-size: 18px;
        }

        .driver-stats strong {
            color: #ffd700;
        }

        .score-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .score-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .score-btn:hover {
            transform: scale(1.05);
        }

        .play-again {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
        }

        .exit-btn {
            background: linear-gradient(135deg, #ff6b6b, #c62828);
            color: white;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 1px 1px 2px black;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .control-btn {
            background: rgba(0,0,0,0.6);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.95);
            background: #ffd700;
            color: #000;
        }

        @media (max-width: 768px) {
            .control-buttons {
                display: flex;
            }
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Greenery Background -->
    <div class="grass"></div>
    <div class="tree"></div>
    <div class="tree"></div>
    <div class="tree"></div>
    <div class="tree"></div>
    <div class="tree"></div>
    <div class="tree"></div>
    <div class="flower" style="left: 100px;"></div>
    <div class="flower" style="left: 300px; background: #ffeb3b;"></div>
    <div class="flower" style="right: 150px; background: #ff5722;"></div>
    <div class="flower" style="right: 350px;"></div>

    <!-- Registration Panel -->
    <div class="registration-panel" id="registrationPanel">
        <div class="reg-container">
            <h1>🚗 GREEN DRIVE 🚗</h1>
            <div class="subtitle">Register to Start Your Journey</div>
            
            <div class="input-group">
                <label>👤 Driver Name</label>
                <input type="text" id="driverName" placeholder="Enter your name" maxlength="20">
            </div>
            
            <div class="input-group">
                <label>🎨 Choose Your Car Color</label>
                <div class="car-select">
                    <div class="car-option" data-color="red">
                        <div class="car-preview car-red"></div>
                        <span style="color:white; font-size:12px;">Red</span>
                    </div>
                    <div class="car-option" data-color="blue">
                        <div class="car-preview car-blue"></div>
                        <span style="color:white; font-size:12px;">Blue</span>
                    </div>
                    <div class="car-option" data-color="green">
                        <div class="car-preview car-green"></div>
                        <span style="color:white; font-size:12px;">Green</span>
                    </div>
                    <div class="car-option" data-color="yellow">
                        <div class="car-preview car-yellow"></div>
                        <span style="color:white; font-size:12px;">Yellow</span>
                    </div>
                </div>
            </div>
            
            <button class="reg-btn" onclick="startGame()">🚀 START RACING 🚀</button>
            <div class="subtitle" style="margin-top: 20px;">⭐ No accident = Never ending game! ⭐</div>
        </div>
    </div>

    <!-- Score Page (After Crash) -->
    <div class="score-page" id="scorePage">
        <div class="score-card">
            <div class="crash-icon">💥🚗💥</div>
            <h1>GAME OVER!</h1>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <div class="driver-stats" id="driverStats"></div>
            <div class="score-buttons">
                <button class="score-btn play-again" onclick="playAgain()">🔄 Play Again</button>
                <button class="score-btn exit-btn" onclick="exitToRegistration()">🏠 Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Wrapper -->
    <div class="game-wrapper" id="gameWrapper">
        <div>
            <div class="game-container">
                <canvas id="gameCanvas" width="600" height="500"></canvas>
                <div class="game-info">
                    <div class="driver-info" id="driverInfo">Driver: -</div>
                    <div class="score-box">Score: <span id="score">0</span></div>
                    <div class="controls">← → &nbsp;&nbsp;<kbd>←</kbd> <kbd>→</kbd></div>
                    <button class="restart-btn" onclick="restartGame()">Restart</button>
                </div>
                <div class="control-buttons">
                    <button class="control-btn" onmousedown="startLeft()" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchstart="startLeft()" ontouchend="stopMove()">◀ LEFT</button>
                    <button class="control-btn" onmousedown="startRight()" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchstart="startRight()" ontouchend="stopMove()">RIGHT ▶</button>
                </div>
                <div class="message" id="gameMessage"></div>
            </div>
        </div>
    </div>

    <script>
        // Game Variables
        let canvas, ctx;
        let gameRunning = false;
        let animationId = null;
        let score = 0;
        let frameCount = 0;
        let gameLoopId = null;
        
        // Driver Info
        let driverData = {
            name: "",
            carColor: "red"
        };
        
        // Car Colors Mapping
        const carColors = {
            red: "#e53935",
            blue: "#1e88e5",
            green: "#43a047",
            yellow: "#fdd835"
        };
        
        // Car Object
        let car = {
            x: 280,
            y: 400,
            width: 40,
            height: 60,
            speed: 5
        };
        
        // Obstacles Array
        let obstacles = [];
        
        // Road Lanes (3 lanes)
        const lanes = [180, 280, 380];
        
        // Key States
        let leftPressed = false;
        let rightPressed = false;
        
        // Selected Car Option
        let selectedCar = "red";
        
        // Game Speed Control
        let currentGameSpeed = 1;
        let baseObstacleSpeed = 3;
        
        // Setup Car Option Selection
        document.querySelectorAll('.car-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.car-option').forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedCar = option.dataset.color;
                driverData.carColor = selectedCar;
            });
        });
        
        // Select first car by default
        document.querySelector('.car-option').classList.add('selected');
        
        // Mobile/Touch Controls
        function startLeft() {
            leftPressed = true;
            console.log("Left pressed");
        }
        
        function startRight() {
            rightPressed = true;
            console.log("Right pressed");
        }
        
        function stopMove() {
            leftPressed = false;
            rightPressed = false;
            console.log("Movement stopped");
        }
        
        function startGame() {
            const name = document.getElementById('driverName').value.trim();
            
            if (!name) {
                alert("Please enter your name!");
                return;
            }
            
            driverData.name = name;
            driverData.carColor = selectedCar;
            
            // Hide registration, show game
            document.getElementById('registrationPanel').style.display = 'none';
            document.getElementById('gameWrapper').style.display = 'flex';
            document.getElementById('scorePage').style.display = 'none';
            
            // Initialize Game
            initGame();
        }
        
        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Reset game state
            gameRunning = true;
            score = 0;
            frameCount = 0;
            obstacles = [];
            car.x = 280;
            car.y = 400;
            leftPressed = false;
            rightPressed = false;
            currentGameSpeed = 1;
            baseObstacleSpeed = 3;
            
            document.getElementById('score').innerText = score;
            document.getElementById('driverInfo').innerHTML = `Driver: ${driverData.name} 🚗`;
            document.getElementById('gameMessage').innerHTML = "🏁 Game Started! Avoid obstacles! 🏁";
            
            // Remove old event listeners
            document.removeEventListener('keydown', handleKeyDown);
            document.removeEventListener('keyup', handleKeyUp);
            
            // Add new event listeners
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);
            
            // Stop any existing game loop
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (gameLoopId) {
                clearTimeout(gameLoopId);
                gameLoopId = null;
            }
            
            // Start game loop
            gameLoop();
        }
        
        function handleKeyDown(e) {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft') {
                leftPressed = true;
                e.preventDefault();
            }
            if (e.key === 'ArrowRight') {
                rightPressed = true;
                e.preventDefault();
            }
        }
        
        function handleKeyUp(e) {
            if (e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === 'ArrowRight') rightPressed = false;
        }
        
        function updateCar() {
            if (leftPressed && car.x > lanes[0]) {
                car.x -= car.speed;
                // Snap to lane
                for (let lane of lanes) {
                    if (Math.abs(car.x - lane) < car.speed) {
                        car.x = lane;
                        break;
                    }
                }
            }
            if (rightPressed && car.x < lanes[lanes.length-1]) {
                car.x += car.speed;
                for (let lane of lanes) {
                    if (Math.abs(car.x - lane) < car.speed) {
                        car.x = lane;
                        break;
                    }
                }
            }
            
            // Boundary check
            car.x = Math.max(lanes[0], Math.min(lanes[lanes.length-1], car.x));
        }
        
        function createObstacle() {
            const laneIndex = Math.floor(Math.random() * lanes.length);
            // Gradually increase obstacle speed based on score
            let obstacleSpeed = baseObstacleSpeed + Math.floor(score / 300);
            // Cap maximum speed
            obstacleSpeed = Math.min(obstacleSpeed, 12);
            
            return {
                x: lanes[laneIndex] - 20,
                y: -60,
                width: 40,
                height: 60,
                speed: obstacleSpeed
            };
        }
        
        function updateObstacles() {
            // Gradually decrease spawn delay as score increases
            let spawnRate = Math.max(30, 55 - Math.floor(score / 200));
            
            if (frameCount % spawnRate === 0 && gameRunning) {
                obstacles.push(createObstacle());
            }
            
            // Update obstacle positions
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].y += obstacles[i].speed;
                
                // Remove off-screen obstacles and increase score
                if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                    i--;
                    if (gameRunning) {
                        score += 10;
                        document.getElementById('score').innerText = score;
                        
                        // Update game speed display
                        let currentSpeed = baseObstacleSpeed + Math.floor(score / 300);
                        currentSpeed = Math.min(currentSpeed, 12);
                        document.getElementById('gameMessage').innerHTML = `🏁 Speed Level: ${Math.floor(currentSpeed - 2)}/10 | Score: ${score} 🏁`;
                    }
                }
            }
        }
        
        function checkCollision() {
            for (let obstacle of obstacles) {
                if (car.x < obstacle.x + obstacle.width &&
                    car.x + car.width > obstacle.x &&
                    car.y < obstacle.y + obstacle.height &&
                    car.y + car.height > obstacle.y) {
                    gameRunning = false;
                    showScorePage();
                    return true;
                }
            }
            return false;
        }
        
        function showScorePage() {
            // Stop the game loop
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            // Display score page with driver stats
            document.getElementById('finalScore').innerText = score;
            document.getElementById('driverStats').innerHTML = `
                <p>👤 <strong>Driver Name:</strong> ${driverData.name}</p>
                <p>🎨 <strong>Car Color:</strong> ${driverData.carColor.toUpperCase()}</p>
                <p>🏆 <strong>Final Score:</strong> ${score}</p>
                <p>🚗 <strong>Obstacles Passed:</strong> ${Math.floor(score / 10)}</p>
                <p>⚡ <strong>Top Speed Reached:</strong> Level ${Math.min(3 + Math.floor(score / 300), 12) - 2}</p>
            `;
            
            document.getElementById('scorePage').style.display = 'flex';
            document.getElementById('gameWrapper').style.display = 'none';
        }
        
        function drawRoad() {
            // Road
            ctx.fillStyle = "#2c2c2c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Asphalt texture
            ctx.fillStyle = "#3a3a3a";
            for(let i = 0; i < canvas.width; i+=20) {
                ctx.fillRect(i, 0, 5, canvas.height);
            }
            
            // Lane markings
            ctx.strokeStyle = "#ffd700";
            ctx.lineWidth = 4;
            ctx.setLineDash([20, 30]);
            for (let lane of lanes) {
                ctx.beginPath();
                ctx.moveTo(lane + 20, 0);
                ctx.lineTo(lane + 20, canvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // Road edges
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.strokeRect(10, 0, canvas.width - 20, canvas.height);
            
            // Side grass
            ctx.fillStyle = "#4caf50";
            ctx.fillRect(0, 0, 10, canvas.height);
            ctx.fillRect(canvas.width - 10, 0, 10, canvas.height);
        }
        
        function drawCar() {
            const color = carColors[driverData.carColor];
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.fillRect(car.x, car.y, car.width, car.height);
            
            // Car roof
            ctx.fillStyle = "#333";
            ctx.fillRect(car.x + 5, car.y - 10, car.width - 10, 20);
            
            // Windows
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(car.x + 8, car.y - 5, 8, 12);
            ctx.fillRect(car.x + car.width - 16, car.y - 5, 8, 12);
            
            // Wheels
            ctx.fillStyle = "#222";
            ctx.fillRect(car.x + 5, car.y + car.height - 10, 8, 12);
            ctx.fillRect(car.x + car.width - 13, car.y + car.height - 10, 8, 12);
            ctx.fillRect(car.x + 5, car.y + 5, 8, 12);
            ctx.fillRect(car.x + car.width - 13, car.y + 5, 8, 12);
            
            // Headlights
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(car.x + car.width - 8, car.y + 8, 5, 5);
            ctx.fillRect(car.x + 3, car.y + 8, 5, 5);
            
            ctx.shadowBlur = 0;
        }
        
        function drawObstacles() {
            for (let obstacle of obstacles) {
                ctx.fillStyle = "#8B0000";
                ctx.shadowBlur = 5;
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
                
                ctx.fillStyle = "#333";
                ctx.fillRect(obstacle.x + 5, obstacle.y + 5, obstacle.width - 10, 15);
                ctx.fillStyle = "#87CEEB";
                ctx.fillRect(obstacle.x + 8, obstacle.y + 8, 8, 10);
                ctx.fillRect(obstacle.x + obstacle.width - 16, obstacle.y + 8, 8, 10);
                
                ctx.fillStyle = "#222";
                ctx.fillRect(obstacle.x + 5, obstacle.y + obstacle.height - 8, 6, 8);
                ctx.fillRect(obstacle.x + obstacle.width - 11, obstacle.y + obstacle.height - 8, 6, 8);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawTrees() {
            for(let i = 0; i < 4; i++) {
                ctx.fillStyle = "#2e7d32";
                ctx.beginPath();
                ctx.moveTo(15, canvas.height - 80 - i*100);
                ctx.lineTo(35, canvas.height - 130 - i*100);
                ctx.lineTo(55, canvas.height - 80 - i*100);
                ctx.fill();
                ctx.fillStyle = "#8B4513";
                ctx.fillRect(30, canvas.height - 80 - i*100, 10, 25);
            }
            
            for(let i = 0; i < 4; i++) {
                ctx.fillStyle = "#388e3c";
                ctx.beginPath();
                ctx.moveTo(canvas.width - 55, canvas.height - 80 - i*100);
                ctx.lineTo(canvas.width - 35, canvas.height - 130 - i*100);
                ctx.lineTo(canvas.width - 15, canvas.height - 80 - i*100);
                ctx.fill();
                ctx.fillStyle = "#8B4513";
                ctx.fillRect(canvas.width - 40, canvas.height - 80 - i*100, 10, 25);
            }
        }
        
        function drawClouds() {
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            let time = Date.now() / 1000;
            ctx.beginPath();
            ctx.arc(100 + (time * 20) % canvas.width, 50, 30, 0, Math.PI * 2);
            ctx.arc(130 + (time * 20) % canvas.width, 40, 25, 0, Math.PI * 2);
            ctx.arc(70 + (time * 20) % canvas.width, 40, 25, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(450 + (time * 15) % canvas.width, 80, 35, 0, Math.PI * 2);
            ctx.arc(490 + (time * 15) % canvas.width, 70, 28, 0, Math.PI * 2);
            ctx.arc(410 + (time * 15) % canvas.width, 70, 28, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function gameLoop() {
            if (!gameRunning) {
                return;
            }
            
            frameCount++;
            
            updateCar();
            updateObstacles();
            
            if (checkCollision()) {
                return;
            }
            
            // Drawing
            drawRoad();
            drawTrees();
            drawClouds();
            drawObstacles();
            drawCar();
            
            // Speed indicator with gradual increase
            let currentSpeed = baseObstacleSpeed + Math.floor(score / 300);
            currentSpeed = Math.min(currentSpeed, 12);
            ctx.font = "bold 14px Arial";
            ctx.fillStyle = "#ffd700";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡ SPEED: Level " + (currentSpeed - 2) + "/10", canvas.width - 160, 30);
            ctx.fillText("🎯 SCORE: " + score, canvas.width - 160, 50);
            
            // Continue game loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function restartGame() {
            // Stop current game
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            gameRunning = false;
            
            // Reset and restart
            initGame();
        }
        
        function playAgain() {
            // Stop current game
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            gameRunning = false;
            
            // Hide score page
            document.getElementById('scorePage').style.display = 'none';
            
            // Reset and restart game
            initGame();
        }
        
        function exitToRegistration() {
            // Stop current game
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            gameRunning = false;
            
            // Hide game and score page, show registration
            document.getElementById('scorePage').style.display = 'none';
            document.getElementById('gameWrapper').style.display = 'none';
            document.getElementById('registrationPanel').style.display = 'flex';
            
            // Clear form
            document.getElementById('driverName').value = '';
        }
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
    </script>
</body>
</html>
